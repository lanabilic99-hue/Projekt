<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Tamna pozadina sa gradijentom - noćni đir -->
  <defs>
    <linearGradient id="nightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1929;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a52;stop-opacity:1" />
    </linearGradient>
    
    <!-- Akcentna plava boja za detalje -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a7bc4;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#2a7bc4;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#2a7bc4;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Pozadina -->
  <rect width="1000" height="600" fill="url(#nightGradient)"/>
  
  <!-- 2RIBARA glavna tekst -->
  <text x="500" y="280" font-family="'Times New Roman', Times, serif" font-size="140" font-weight="300" fill="white" text-anchor="middle" letter-spacing="8">
    2RIBARA
  </text>
  
  <!-- Valovi sa akcentnom plavom - dekorativan element -->
  <g stroke="url(#accentGradient)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 200 340 Q 300 330 400 340 T 600 340 T 800 340" opacity="0.7"/>
    <path d="M 180 360 Q 280 350 380 360 T 580 360 T 820 360" opacity="0.5"/>
    <path d="M 220 380 Q 320 370 420 380 T 620 380 T 780 380" opacity="0.3"/>
  </g>
  
  <!-- Linija sa akcentnom plavom ispod teksta -->
  <line x1="150" y1="410" x2="850" y2="410" stroke="#2a7bc4" stroke-width="2" opacity="0.6"/>
  
  <!-- RESTORAN tekst -->
  <text x="500" y="480" font-family="'Times New Roman', Times, serif" font-size="48" font-weight="300" fill="white" text-anchor="middle" letter-spacing="6">
    RESTORAN
  </text>
  
  <!-- Sitni dekorativni elementi - točkice -->
  <circle cx="250" cy="530" r="3" fill="#2a7bc4" opacity="0.6"/>
  <circle cx="500" cy="530" r="3" fill="#2a7bc4" opacity="0.6"/>
  <circle cx="750" cy="530" r="3" fill="#2a7bc4" opacity="0.6"/>
</svg>